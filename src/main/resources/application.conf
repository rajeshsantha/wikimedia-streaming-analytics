# =============================================================================
# application.conf — Typesafe Config (HOCON) for Wikimedia Streaming Analytics
#
# Loaded by ConfigFactory.load() at runtime.
# Override any value at startup with -Dkey=value JVM arguments.
# =============================================================================

# -----------------------------------------------------------------------------
# Kafka
# -----------------------------------------------------------------------------
kafka {
  # Address(es) of Kafka brokers — matches the PLAINTEXT_HOST listener in
  # docker-compose.yml.
  bootstrap-servers = "localhost:9092"

  # Topic that the SSE producer writes to and Spark reads from.
  topic = "wikimedia-events"

  # Kafka consumer group used by the Spark Structured Streaming reader.
  group-id = "wikimedia-streaming-consumer"
}

# -----------------------------------------------------------------------------
# Wikimedia EventStreams (SSE)
# -----------------------------------------------------------------------------
wikimedia {
  # Public Wikimedia EventStreams endpoint for recent-change events.
  stream-url = "https://stream.wikimedia.org/v2/stream/recentchange"
}

# -----------------------------------------------------------------------------
# Apache Spark
# -----------------------------------------------------------------------------
spark {
  app-name = "WikimediaStreamingAnalytics"

  # local[*] uses all available CPU cores — swap for a real cluster master URL
  # (e.g. spark://host:7077 or yarn) in production.
  master = "local[*]"

  # Number of partitions produced by wide transformations (joins, aggregations).
  # The default of 200 is far too high for a single-machine dev setup.
  shuffle-partitions = 4

  # Suppress verbose Spark log output during development.
  log-level = "WARN"
}

# -----------------------------------------------------------------------------
# Delta Lake table paths
# Delta directories are created automatically on first write.
# -----------------------------------------------------------------------------
delta {
  tables {
    trending-articles = "delta/trending_articles"
    active-editors    = "delta/active_editors"
    edit-spikes       = "delta/edit_spikes"
  }
}

# -----------------------------------------------------------------------------
# Spark Structured Streaming checkpoint paths
# Each streaming query must have its own dedicated checkpoint directory.
# Checkpoints store committed offsets and streaming state so that the query
# can resume exactly where it left off after a restart.
# -----------------------------------------------------------------------------
checkpoint {
  paths {
    trending-articles = "checkpoint/trending_articles"
    active-editors    = "checkpoint/active_editors"
    edit-spikes       = "checkpoint/edit_spikes"
  }
}
